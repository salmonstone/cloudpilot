apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: cloudpilot-alerts
  namespace: monitoring
  labels:
    release: prometheus
spec:
  groups:
  - name: cloudpilot
    rules:
    - alert: PodCrashLooping
      expr: rate(kube_pod_container_status_restarts_total[5m]) > 0
      for: 1m
      labels:
        severity: critical
      annotations:
        summary: "Pod {{ $labels.pod }} is crash looping"

    - alert: HighCPU
      expr: container_cpu_usage_seconds_total > 0.8
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "High CPU on {{ $labels.pod }}"

    - alert: AppDown
      expr: up{job="cloudpilot-backend"} == 0
      for: 30s
      labels:
        severity: critical
      annotations:
        summary: "CloudPilot backend is DOWN"
