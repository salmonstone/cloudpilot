apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: filebeat
  namespace: logging
spec:
  selector:
    matchLabels: { app: filebeat }
  template:
    metadata:
      labels: { app: filebeat }
    spec:
      serviceAccountName: filebeat
      containers:
      - name: filebeat
        image: docker.elastic.co/beats/filebeat:8.11.0
        args: ['-c', '/etc/filebeat.yml', '-e']
        volumeMounts:
        - { name: config,       mountPath: /etc/filebeat.yml, subPath: filebeat.yml }
        - { name: varlog,       mountPath: /var/log }
        - { name: varlibdocker, mountPath: /var/lib/docker/containers, readOnly: true }
      volumes:
      - { name: config,       configMap: { name: filebeat-config } }
      - { name: varlog,       hostPath: { path: /var/log } }
      - { name: varlibdocker, hostPath: { path: /var/lib/docker/containers } }
      tolerations:
      - { key: node-role.kubernetes.io/master, effect: NoSchedule }
